<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Page Not Found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      text-align: center;
      font-family: "IBM Plex Sans", -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background:
        radial-gradient(circle at 10% 6%, #deeaf7 0%, transparent 26%),
        radial-gradient(circle at 90% 4%, #ddf2f0 0%, transparent 24%),
        #f2f3f5;
      color: #1a1d23;
    }
    .box {
      flex: 1;
      display: flex;
      justify-content: center;
      flex-direction: column;
    }
    .number {
      font-family: "Space Grotesk", sans-serif;
      font-size: 96px;
      font-weight: 700;
      color: #d1d5db;
      letter-spacing: 0.08em;
    }
    .text {
      font-size: 16px;
      margin: 18px;
      color: #6b7280;
    }
    .btn-container {
      display: flex;
      justify-content: center;
    }
    .btn {
      padding: 9px 20px;
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      background: rgba(255,255,255,0.8);
      border: 1px solid #d1d5db;
      color: #1a1d23;
      margin: 20px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s ease;
      backdrop-filter: blur(8px);
    }
    .btn:hover {
      border-color: #0ea5e9;
      color: #0ea5e9;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(14,165,233,0.12);
    }
    .footer {
      padding: 16px;
      border-top: 1px solid #e5e7eb;
      color: #9ca3af;
      font-size: 13px;
    }
    .footer a {
      text-decoration: none;
      font-weight: 600;
      color: #0ea5e9;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="number">4 0 4</div>
    <div class="text">
      Page not found
    </div>
    <div class="btn-container">
      <a class="btn" id="back">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" style="margin-right: 8px;">
          <path fill="none" d="M0 0h24v24H0z"/>
          <path d="M5.828 7l2.536 2.536L6.95 10.95 2 6l4.95-4.95 1.414 1.414L5.828 5H13a8 8 0 1 1 0 16H4v-2h9a6 6 0 1 0 0-12H5.828z"/>
        </svg>
        Back
      </a>
    </div>
  </div>
  <footer class="footer">
    Powered by <a href="https://gridea.dev" target="_blank">Gridea</a>
  </footer>
  <script>
    var back = document.getElementById('back')
    back.onclick = function() { console.log('run...'); history.back() }
  </script>
</body>
</html>
